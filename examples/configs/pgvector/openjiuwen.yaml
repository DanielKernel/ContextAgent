user_id: context-agent

llm_config:
  provider: openai
  model: ${CTXLLM_MODEL}
  api_key: ${CTXLLM_API_KEY}
  base_url: ${CTXLLM_BASE_URL}
  timeout: 30
  max_retries: 2

embedding_config:
  provider: openai
  model: ${EMBED_MODEL}
  api_key: ${EMBED_API_KEY}
  base_url: ${EMBED_BASE_URL}
  dimension: 1024
  batch_size: 10

vector_store:
  backend: pgvector
  dsn: postgresql://postgres@127.0.0.1:55432/context_agent
  schema: public
  table_name: ltm_memory
  embedding_dimension: 1024
  distance: cosine
  index_type: ivfflat
  lists: 100
  metadata_fields:
    - scope_id
    - session_id
    - memory_type
    - source
    - created_at
    - updated_at
    - tags

memory_config:
  top_k: 10
  score_threshold: 0.3
  enable_user_profile: true
  enable_semantic_memory: true
  enable_episodic_memory: true
  enable_summary_memory: true
