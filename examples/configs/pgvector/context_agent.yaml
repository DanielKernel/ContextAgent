service:
  name: context-agent
  environment: development
  log_level: INFO
  debug: false

http:
  host: 0.0.0.0
  port: 8080

redis:
  url: redis://localhost:6379/0
  pool_max_connections: 50

storage:
  s3:
    endpoint_url: ""
    bucket: context-agent-versions
    access_key: ""
    secret_key: ""

compression:
  llm:
    base_url: ""
    model: ""
    api_key: ""
    timeout_s: 30.0
    max_retries: 2
  compaction_trigger_ratio: 0.85

integrations:
  openjiuwen:
    config_path: openjiuwen.yaml

budgets:
  latency:
    hot_tier_timeout_ms: 20.0
    warm_tier_timeout_ms: 100.0
    cold_tier_timeout_ms: 300.0
    aggregation_timeout_ms: 2000.0
  tokens:
    default_token_budget: 4096
    tool_result_token_limit: 1024

memory:
  queue_maxsize: 1000
  worker_count: 2
  hot_tier_ttl_s: 300
  max_notes_per_session: 100

retrieval:
  default_top_k: 10
  timeout_ms: 1000.0
  rerank_top_k: 5
  hybrid:
    vector_weight: 0.6
    sparse_weight: 0.4
    rrf_k: 60
  jit_cache:
    ttl_s: 60
    local_max_entries: 512
  hotness:
    alpha: 0.2
    half_life_days: 7.0
  tool_selection:
    rag_threshold: 20
    top_k: 10

context_health:
  thresholds:
    poisoning: 0.7
    distraction: 0.5
    confusion: 0.4
    clash: 0.6

observability:
  otlp_endpoint: ""
  prometheus_enabled: true
  metrics_prefix: context_agent

auth:
  enabled: false
  secret_key: ""
  api_keys: []
