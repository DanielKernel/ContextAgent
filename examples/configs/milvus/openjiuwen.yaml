user_id: openclaw

llm_config:
  provider: ${CTXLLM_PROVIDER}
  model: ${CTXLLM_MODEL}
  api_key: ${CTXLLM_API_KEY}
  base_url: ${CTXLLM_BASE_URL}
  timeout: 30
  max_retries: 2

embedding_config:
  provider: ${EMBED_PROVIDER}
  model: ${EMBED_MODEL}
  api_key: ${EMBED_API_KEY}
  base_url: ${EMBED_BASE_URL}
  dimension: 1024
  batch_size: 10

vector_store:
  backend: milvus
  uri: http://127.0.0.1:19530
  token: ""
  collection_name: context_agent_memory
  embedding_dimension: 1024
  metric_type: COSINE
  index_type: HNSW
  index_params:
    M: 16
    efConstruction: 200
  search_params:
    ef: 64

memory_config:
  top_k: 10
  score_threshold: 0.3
  enable_long_term_mem: true
  enable_user_profile: true
  enable_semantic_memory: true
  enable_episodic_memory: true
  enable_summary_memory: true
