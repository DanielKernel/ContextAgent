service:
  name: context-agent
  environment: development
  log_level: INFO
  debug: false

http:
  host: 0.0.0.0
  port: 8080

redis:
  url: redis://localhost:6379/0
  pool_max_connections: 50

storage:
  s3:
    endpoint_url: ""
    bucket: context-agent-versions
    access_key: ""
    secret_key: ""

llm:
  base_url: http://localhost:11434
  model: qwen2.5:7b
  timeout_s: 30.0
  max_retries: 2

integrations:
  openjiuwen:
    config_path: openjiuwen.yaml

budgets:
  latency:
    hot_tier_timeout_ms: 20.0
    warm_tier_timeout_ms: 100.0
    cold_tier_timeout_ms: 300.0
    aggregation_timeout_ms: 200.0
  tokens:
    default_token_budget: 4096
    tool_result_token_limit: 1024

memory:
  queue_maxsize: 1000
  worker_count: 2

observability:
  otlp_endpoint: ""
  prometheus_enabled: true
  metrics_prefix: context_agent

auth:
  enabled: false
  secret_key: ""
  api_keys: []
